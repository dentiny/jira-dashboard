<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pyxen Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>Pyxen Board</h1>
        <span class="subtitle">Project tickets</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-ghost btn-sm" onclick="runGlobalTest()">Run Tests</button>
        <button class="btn btn-ghost btn-sm" onclick="runGlobalPrepush()">Pre-push Check</button>
      </div>

    </div>
  </header>

  <main>
    <section id="newTicketForm" class="new-ticket-form">
      <div class="new-ticket-row">
        <input type="text" id="newTitle" placeholder="Ticket title…" />
        <input type="text" id="newContent" placeholder="Description (optional)" />
        <button class="btn btn-primary" onclick="createTicket()">Create Ticket</button>
      </div>
      <div id="newTicketError" class="error" style="display:none"></div>
    </section>
    <div id="board"></div>
  </main>

  <!-- Ticket Detail Modal -->
  <div id="ticketModal" class="modal-overlay" style="display:none">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h2 id="ticketTitle"></h2>
        <button class="btn-close" onclick="closeModal('ticketModal')">&times;</button>
      </div>
      <div class="modal-body" id="ticketBody"></div>
      <div class="modal-footer" id="ticketFooter"></div>
    </div>
  </div>

  <div id="toast" class="toast" style="display:none"></div>

  <!-- Test / Pre-push Output Modal -->
  <div id="outputModal" class="modal-overlay" style="display:none">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h2 id="outputTitle"></h2>
        <button class="btn-close" onclick="closeModal('outputModal')">&times;</button>
      </div>
      <div class="modal-body" id="outputBody"></div>
      <div class="modal-footer">
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
